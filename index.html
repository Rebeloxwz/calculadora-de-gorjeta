<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>calculador de gorjeta
    </title>
</head>

<body>
    <header>
        <img src="./images/logo.svg" alt="logo do splitter">
    </header>
    <main>

        <section class="informações">
            <form action="">
                <div class="conta">
                    <label for="conta"></label>
                </div>
                <img src="./images/icon-dollar.svg" alt="icone de cifrão">
                <input type="number" name="conta" id="conta" placeholder="0">
                <div>
                    <div class="gorjeta">
                        <label for="outra"> selecione a gorjeta </label>
                        <div>
                            <input type="button" value="5%">
                            <input type="button" value="10%">
                            <input type="button" value="15%">
                            <input type="button" value="25%">
                            <input type="button" value="50%">
                            <input type="button" value="outra" id="outra" placeholder="Outra">
                        </div>
                    </div>
                    <div class="pessoas">
                        <label for="pessoas">Número de pessoas</label>
                        <p>não pode ser zero ou negativo</p>
                    </div>
                    <img src="./images/icon-person.svg" alt="icone de pessoas">
                    <input type="number" name="pessoas" id="pessoas" placeholder="0">
                    <div>
                    </div>
            </form>
        </section>
        <section class="resultados">
            <div class="gorjeta-total">
                <p>
                    <strong>Total</strong> <br>
                    /pessoa
                </p>
                <strong>$0.00</strong>


                <div class="total">
                    <p>
                        <strong>Total</strong> <br>
                        /pessoa
                    </p>
                    <strong>$0.00</strong>
                </div>

        </section>
    </main>
</body>

</html>
